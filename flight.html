<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flight Booking</title>
  <link rel="stylesheet" href="flight.css" />
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">

  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>
  <header>
    <!-- navbar -->
    <nav class="navbar" aria-label="Primary">
      <a class="logo" href="index.html">
        <picture>
          <source srcset="assets/icons/logo-stacked.png" media="(max-width: 768px)">
          <img src="assets/icons/logo-horizontal.png" alt="SkyWays logo" />
        </picture>
      </a>

      <!-- CSS-only hamburger toggle -->
      <input type="checkbox" id="nav-toggle" class="nav-toggle" />
      <label for="nav-toggle" class="nav-toggle-label">
        <span></span>
      </label>

      <ul class="nav-links">
        <li><a href="destinations.html">Destinations</a></li>
        <li><a href="flight.html">Flights</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="faq.html">FAQ</a></li>
      </ul>
    </nav>
  </header>
  
  <br><br>
  <header class="booking-header">
    <h1><i class="fa-solid fa-plane-departure"></i> Flight Reservation</h1><br />
    <p id="trip-info">You are booking a trip to <span id="destination">—</span> for <span id="price">—</span></p>
  </header>

  <main class="booking-container">
    <form class="booking-form" action="thank-you.html" method="get">
      <!-- Full Name -->
      <div class="form-group">
        <label for="name"><i class="fa-regular fa-user"></i> Full Name *</label>
        <input type="text" id="name" name="name" required />
      </div>

      <!-- Passport -->
      <div class="form-group">
        <label for="passport"><i class="fa-solid fa-passport"></i> Passport Number *</label>
        <input type="text" id="passport" name="passport" required />
      </div>

      <!-- Phone -->
      <div class="form-group">
        <label for="phone"><i class="fa-solid fa-phone"></i> Phone Number *</label>
        <input type="tel" id="phone" name="phone" required />
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="email"><i class="fa-regular fa-envelope"></i> Email</label>
        <input type="email" id="email" name="email" />
      </div>

      <!-- Company -->
      <div class="form-group">
        <label for="company"><i class="fa-solid fa-building"></i> Company Name</label>
        <input type="text" id="company" name="company" />
      </div>

      <!-- Date of Birth -->
      <div class="form-group">
        <label for="birthdate"><i class="fa-regular fa-calendar"></i> Date of Birth</label>
        <input type="date" id="birthdate" name="birthdate" />
      </div>

      <!-- Kosher -->
      <div class="form-group checkbox">
        <label>
          <input type="checkbox" id="kosher" name="kosher" />
          <i class="fa-solid fa-utensils"></i> Request Mehadrin Kosher
        </label>
      </div>

      <!-- Notes -->
      <div class="form-group">
        <label for="notes"><i class="fa-regular fa-note-sticky"></i> Additional Notes</label>
        <textarea id="notes" name="notes" rows="4" placeholder="Any special requests or details..."></textarea>
      </div>

      <!-- Submit -->
      <button type="submit" class="submit-btn">
        <i class="fa-solid fa-check"></i> Book Now
      </button>
    </form>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2025 SkyWays Airlines. All rights reserved.</p>

      <ul class="footer-links">
        <li><a href="policy.html">Policy</a></li>
        <li><a href="faq.html">FAQ</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="https://www.iata.org/" target="_blank" rel="noopener">IATA</a></li>
      </ul>
    </div>
  </footer>

  <!-- advanced search, with real results -->
  <script>
    // Destination data for search synchronization
    const destinationMap = {
      "athens": { name: "Athens, Greece", price: "₪579" },
      "rome": { name: "Rome, Italy", price: "₪699" },
      "london": { name: "London, UK", price: "₪499" },
      "paris": { name: "Paris, France", price: "₪749" },
      "tokyo": { name: "Tokyo, Japan", price: "₪999" },
      "newyork": { name: "New York, USA", price: "₪899" },
      "nyc": { name: "New York, USA", price: "₪899" },
      "ath": { name: "Athens, Greece", price: "₪579" }, // airport code
      "fco": { name: "Rome, Italy", price: "₪699" },
      "lhr": { name: "London, UK", price: "₪499" },
      "cdg": { name: "Paris, France", price: "₪749" },
      "nrt": { name: "Tokyo, Japan", price: "₪999" },
      "jfk": { name: "New York, USA", price: "₪899" },
      // Additional destinations from packages
      "kyoto": { name: "Kyoto, Japan", price: "$1200" },
      "bangkok": { name: "Bangkok, Thailand", price: "$900" },
      "chiangmai": { name: "Chiang Mai, Thailand", price: "$700" },
      "beijing": { name: "Beijing, China", price: "$1100" },
      "goa": { name: "Goa, India", price: "$850" },
      "barcelona": { name: "Barcelona, Spain", price: "$1250" },
      "berlin": { name: "Berlin, Germany", price: "$1100" },
      "toronto": { name: "Toronto, Canada", price: "$1300" },
      "rio": { name: "Rio de Janeiro, Brazil", price: "$1200" },
      "cancun": { name: "Cancún, Mexico", price: "$1050" },
      "cairo": { name: "Cairo, Egypt", price: "$900" },
      "capetown": { name: "Cape Town, South Africa", price: "$1250" },
      "marrakech": { name: "Marrakech, Morocco", price: "$950" },
      "sydney": { name: "Sydney, Australia", price: "$1700" },
      "queenstown": { name: "Queenstown, New Zealand", price: "$1800" },
    };

    // Extract parameters from URL
    const params = new URLSearchParams(window.location.search);
    const to = params.get("to");
    let dest = "Paris, France";
    let prc = "1,299$";

    if (to) {
      // Normalize the 'to' parameter: lowercase, remove spaces and special chars
      const key = to.toLowerCase().replace(/[^a-z]/g, '');
      if (destinationMap[key]) {
        dest = destinationMap[key].name;
        prc = destinationMap[key].price;
      }
    } else {
      // Fallback to pkg and price params (from destinations.html links)
      const pkg = params.get("pkg");
      const price = params.get("price");
      if (pkg) dest = pkg;
      if (price) prc = `$${price}`;
    }

    document.getElementById("destination").textContent = dest;
    document.getElementById("price").textContent = prc;
  </script>
</body>

</html>
